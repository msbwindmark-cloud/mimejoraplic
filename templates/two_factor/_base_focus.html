{% extends "two_factor/_base.html" %}

{% block content_wrapper %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold text-primary">trustbridge</h1>
                <p class="text-muted">Configuración de Seguridad de la Cuenta</p>
            </div>
            <div class="card shadow">
                <div class="card-body p-4">
                    {% block content %}{% endblock %}
                </div>
                <div class="card-footer bg-light text-center py-3">
                    <a href="{% url 'account_logout' %}" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-left"></i> Cerrar sesión y volver al inicio
                    </a>
                </div>
            </div>
            <p class="text-center text-muted small mt-3">TrustBridge &copy; 2026 &middot; Firma Digital Segura</p>
        </div>
    </div>
</div>
{% endblock %}
